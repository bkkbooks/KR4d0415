body:
  text: 心泉學詩稿巻五宋蒲夀宬撰七言律詩用翁雪舟送春韻三首錦衣年少不知愁風雨無端惱客遊萬㸃殘紅空過眼一畨新緑又從頭夕陽細草堪横笛野渡垂楊可繫舟三百六旬渾是醉餞春何用苦綢繆隙駒如箭未堪憐晴雨悲歡付自然九十春光能幾日一畨花信又明年殘紅數㸃心終在垂栁千絲意許妍説與游人莫惆悵綠隂幽草一般天底事黄鸝喚不休出門欣見綠隂稠殘花滿地無人掃芳草連天起客愁淚落田間聞牧笛醉歸江上問漁舟杜鵑也合催春去何處而今孟浪遊送擇齋先生徐大監赴建倉帝命元臣選外臺南州聲望乆崔嵬倉箱早辦九年集原隰欣迎四牡來父老此時方見日吏饕平晝忽驚雷錦衣翠節鄉邦重耿耿文星照上台用老竹與子晦韻冰清玉潔好風襟老屋凄凉興味深身世已非塵外蹟語言猶是竹邊音且陪此日鶯花樂休憶當年燈火心白髪相看能幾許樽前須要惜光隂和楊芸齋送枯崕住興福韻一夜春光到竹門東風拂拂動閒雲鉗鎚粗了人間債缾錫蹔抛林下羣烟塔忽驚當户立霜鐘猶記舊山聞髙談亹亹天花落老衲廊頭意自欣寄石隠老嶼上人已約巖頭同數宿如何消息竟茫然抱琴有意彈明月采藥無心到絶巓不過虎溪安得笑偶逢醉石便欹眠山林此樂而今少一日相從是宿縁和倪梅村偶擕琴冊傍林泉坐對梅花記往年鴻燕何心成巧避䕫蚿無語自相憐才唫瘦影黄昬月又見殘紅細雨天擬把楚騷重載酒掀髯抵掌話前縁再用韻和葦航長江不直一杯寛自笑狂生筆力慳有酒何須誇戱馬遶籬豈必强登山世無劉表誰知已人説淵明我厚顔風雨滿城都過了多簪黄菊出松闗與小兒助子遊江横作葺荷偶憶湘纍句築屋還尋杜若汀孤樹每留殘日白片㠶徐度逺山青海鷗知我斷機慮漁父與誰分醉醒何處扁舟横短笛月明風裊不堪聽江横暮景獨倚闌干對落霞垂楊古渡欲棲鴉漁翁何處烟藏浦白鷺成羣月浸沙淚落西風呌黄鵠酒闌深夜聽琵琶誰人得似鴟夷子一葉浮雲總是家再題江横一榻虚明懐抱幽水天無際望悠悠潮來不覺沙洲没浪打只疑茅屋浮何處漁人横短笛有時􅄔婦泣孤舟忘機何必曽相狎説與江邊羣白鷗遊鼓山題天風海濤亭翛翛白髪倚欄干笑仰髙峯巾袂仙但見烟霞相逺近不知宇宙有中邊宦途人在非凡境客裏身遊極樂天自歎情懐今潦倒重來未識是何年送使君趙寺丞泰先生别郡安知寄此州攀轅合借我公留求仁而得又何怨蔽美豈其為好修花逕怕風宜落絮秧田足雨恐妨牟春歸誰識春心苦才説思春欲白頭寄何我軒十年不見此髯翁笑我而今鬢亦蓬幾度因詩親水部一廻看劍泣山公無心塵世雲移岫極目仙壺浪拍空痛飲劇談非是夣寸丹長與荔枝紅閒坐海觀興致悠然是時月白如晝一笑靈龜尾曵塗扁舟聊復寄菰蒲潮生潮落帆來去雲巻雲舒山有無風定若教胥怒息月明空憶蠡遊孤漁翁不識人間事白髪青蓑酒滿壺嶺後山莊感慨重來嵗月深手栽松栢巳成林萬山自此無南北一水長流不古今先訓丁寧猶在耳老吾寂寞自沾襟君恩已遂祈閒請莘野歸耕是本心回謁藍主簿道傍見梅偶成誰家一樹銕斜欹的皪踈花出短籬黄葉乆隨風捲地幽姿當與雪同時白頭朔漠窮蘇武瘦骨西山餓伯夷三嗅清芬一杯水徘徊無語笑掀眉題深省庵結草為庵寄一枝鐘魚聊復事清䂓野蔬入供無人識古柏為香有佛知頻去飲泉非為渴偶來坐石忽忘飢常談且接頭陀伴欲説上乘空費辭依韻寄呈林城山隣蛩深夜語幽幽猶此塵埃一敝裘甘菊已荒歸栗里蒲萄堪醉勝涼州知心海上千年鶴極目雲間五色樓白髪正殷松栢念不因泉石老斯丘即席用委順聽甘師琴韻獨抱琴聲感嵗年𡨕捜趣外欲無絃廣陵寂寂嵇生去秋木幽幽鳴犢賢一㸃山泉巖竇雨數聲瑶佩泬寥天音徽千載何人㑹願和薫風殿閣前與興福老枯崖乘月觀濤無心携起碧笻條偶爾來從漁父招山色多情似呉越濤聲牽夣到金焦魚龍一任風雲便鷗鷺不知天海遥共倚欄干秋月白豈期真樂在今宵西巖有蜂巢鶴柵石路層層碧蘚花矮窓低户足烟霞愁聞獨鶴悲寒角静閱羣蜂凑晩衙野菜旋挑奚待糝石泉新汲自煎茶爐熏銷盡抛書巻閒倚䦨干看日斜贈洪都髙士蕭野鶴亦號野田自從華表去蹁蹮縠頂丹深不計年萬里孤光中夜月一聲清唳九重天偶然夣覺思遼海不是饑驅向野田赤壁秋髙風露下無心曽喚老坡仙贈呉仰雲雲巾羽扇得真如不用羞慙非故吾入手千般休説巧轉頭一著不為愚塵中羈絆無還有物外逍遥有若無我若忘機曽悟此烟波鷗鷺是吾徒嵗旦勉田隣嵗律從新泰道亨出門欣見麥青青已無闗外石壕吏遥望城頭紫氣星往事莫追由世數寛恩頻下為生靈而今頗覺農為重説與村村父老聽端午鬢符腰艾去紛紛荷葉荷花匝水濵思逺樓前雖有曲若邪溪畔豈無人莫將楚恨悲兒女聊把騷章託鬼神濁酒滿壺漁父笑江邊鷗鷺正相親山園芍藥忽有花喜而賦披草籬根問舊花一畨春事又萌芽非因老態逢時感祗怨昏瞳作霧遮何處而今尋爛熳不圗於此見英華翻堦自合流芳詠可惜飄零野客家夣故人郭推官元用詩以奠之鷄絮才陳淚已傾故人旌旐尚禪扄塵中愧我頭空白夣裏逢君眼更青束髪論交真意氣傷心無語負幽㝠求銘敢後朋儕事况復原頭有鶺鴒夜聞隣笛幽夣初回漏未央起聞隣笛倍凄凉不知何處石崖裂忽送一聲江水長短棹清風懐赤壁斷垣斜月隠山陽猶疑吹到梅花落不見梅花空攪腸風雨終夜獨坐不寐風雨瀟瀟到夜終夜寒一室坐虚空何當樂與二三子免使凄其六一翁老大自甘為老大窮通休苦較窮通此心不作窺園想流水落花春夣中田園秋興草屋柴門風露凉寒瓜收蔓力鋤荒新栽莙薘恰逢雨欲剪芹藍猶待霜牧䜿歸來煨芋熟田翁相就潑醅香里胥偶報徴苖急自闢閒畦早築場郊行有感鷄犬不鳴何處村頽簷破壁問誰門蓬蒿滿地田園在瓦礫如山井臼存青草髑髏疑是夢白頭老父泣無言諮諏隣舊多為鬼倚杖徘徊堪斷魂近重陽作滿城風雨近重陽梧竹蕭蕭欲斷腸敢望白衣來送酒擬將黄菊去為糧繫茰安得山堪避落帽豈無人在旁千載風流心獨㑹飲泉亦足慰凄凉賦枸杞神草如蓬世不知壁間墻角自離離辛盤空芼仙人杖藥斧惟尋地骨皮千嵗未逢朱孺子四時堪供陸天隨霜晨忽訝春櫻熟閒摘殷紅遶斷籬畵船世路羊腸姑已之扁舟我欲問冰夷祗因吏部酷好酒豈是鷄林要售詩萬事不如潮有信寸心唯頼月相知斜風細雨休歸去此政老翁沉醉時遊武夷九曲紫縵紅裀事有根緑函金鎻蜕猶存無縁得到千巖頂試問而今幾代孫漢祀昔曽陳玉脯晉人方始識桃源不因大隠屏中老未易抽簪扣洞門
