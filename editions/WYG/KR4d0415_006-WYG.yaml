  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0415_WYG_006-1a, image: WYG1189/WYG1189-0866a.png}
body:
  text: 心泉學詩稿巻六宋蒲夀宬撰五言絶句寄石隠閉門十日雨破屋砌生苔此意何人㑹抱琴來不来題葉寄楊芸夫吟得秋風老敲忩意轉深憑將林下事為寄與知音心泉二首涓涓萬古意湛湛一塵無明月來窺鏡宵寒露滴珠驟来驚辟易久視益虛無咫尺星堪摘波揺又走珠菊泉詩䟽泉得古髓種菊䝉秋潭願與村中人一瓢共清甘聞泉山椒一雨過石罅百泉鳴應接都不暇更兼秋月明澗亭麈尾泉泉揮玉麈尾岫擁翠雲裘盡日看不足倚䦨生古愁江横信筆潮汐有贏縮江横無古今魚龍任掀舞孤月在天心書滴翠巖壁蘿衣濕寒翠苔錦上嶙峋一榻千峯裡因詩憶古人書香爐瀑布圖後飛流三百丈日射碧琉璃一氣何終極淋漓自不知青霞西亭長松被薜荔怪石生煙霞簷牙木杪見上有山人家滄浪亭曉色桃蒸霞春隂栁垂霧為問橋下船㳂流到何處心泉冷冷一澗泉炯炯千樹雪嵗寒鐵石心山中玩芳潔讀可翁閒坐偈夜久風浪息驪龍弄頷珠水怪不敢動明月滿江湖白鬚詩月照當襟雪終剪施摩詰我作白鬚行而得飬生術題石巖石多意氣松樹留髙齡倚仗𦕈雲濤天風吹泠泠怡雲把作一片畫晴隂渾不同不知誰是畫佇立意無窮寒食有感杏粥因懷舊榆羮豈為春慿將禁火事説與乞墦人郊意清晨起搔頭荷鋤出門去露濕野草花香來不知處題畫竹扇寄友明月二千里清風一萬竿相思寫不得寫出夢来看春日聞禽戯題寓廨隔墻聽幽哢入坐春融融午夢恬不成始知身在籠棹歌鼔枻歸去来蓑風鳴策策明月傾我壺滄浪天一碧牧童歌十首荷笠小蒼頭犢裩乘水牛揚鞭自叱咤度隴復慿溝軟坡便佇犢凉䕃聚羣髫一竪忽然起恐牛殘荳苖隔溪騎度水浮去似鴟夷莫話五湖事且㸔牛背兒倦来牛背卧一覺度前岡牛飽兒呼餒歸来煨芋香前山飛暮雨牛上展青蓑囘首牛呼犢哀音兒唱歌斜陽歸處險路熟了無疑結草為衣著圏葭作竹吹野花簮短笠露濕蔓青青莫笑兒童小人間河鼔星老翁分社酒匕箸小孩提黃犢今堪駕明年學把犂生来在田野少小學耕鋤敢望多名譽隨人角掛書芳郊望無際逐草任西東世上千塲夢人間一笛風七言絶句山中秋曉命策空山風露冷野花無數不知名林叢深處無人問時吐秋芬一様清書隠者壁鵑啼花落春已非秧老蠶眠雨初霽牛衣夢覺山日髙風前猶是巢由世飛泉蘚壁輕飛霧雨寒一簾清漱玉珊珊遊鱗莫羡層瀾去鏤雪雕氷滿肺肝題贈枯崖玉麈無心試出拈山房春静燕窺簷相思獨上青霞頂閒倚欄干望塔尖贈老溪孚上人玉澗雙盤略彴過對人捫蝨坐雞窠煮茶與客早歸去落日前山路更多石室閒坐憶東坡漁舟一葉江吞天句成一絶漁舟一葉江吞天誦翁此句心茫然不知何處有此景而今忽墮吾眼前錫老弟山居君住南山我北山隔溪斜照見炊煙相尋懶趂溪邉路村酒時沽上釣船閨意聘得深村玉雪姿力勝杵臼案齊眉笑他老大専房寵猶把房幃比舊時酒量减少年一日㡬鴟夷瓦甓而今力不支莫笑盃中酒量减至和全在半醺時題武夷九曲諸峯向背殊丹青雖巧不能模堂堂標致髙如許靈迹何須問有無重逰武夷偶成櫂歌一首一𣲖彎環九曲溪溪深溪淺净無泥鷺鷥不作窺魚計飛入屏風也似迷月巖皎皎應如欲下弦為誰長掛此巖前行人莫笑中空洞空洞中間盡是天青霞百尺長松巖下風一輪明月屋西峯夢囘細数登山路知在青霞第㡬重玉女峯玉女攅空擁霧鬟鐵心千古照溪灣願分一滴清溪水去洗人間脂粉顔題西山靈峯感應寺路入靈峯西復西桄榔葉暗古招提山僧更在雲深處花落蒼苔幽鳥啼題純陽洞道士當年九日山側身西望翠雲間一枝乞倚純陽洞萬仞崔嵬不可攀次枯崖上人催梅韻黄葉蕭蕭雨滴階夢魂飛到瀑邊梅遥知楖栗山中老一日花間一百囘百花洲梅孤根寧不在栽培枝北枝南春一回盡道㳺魚是佳䜟不知洲上有花魁早梅荷已全凋菊未殘一枝的皪照江干暖風莫詫攙先意留取清芬待嵗寒瀑上見梅有懐老溪上人野水横斜最老枝一生心事雪霜知世人重眼不重鼻祇愛花光與補之雨中見梅泫然而作夢遶孤山欲斷魂竹籬茅舍雨紛紛何心更作廵簷事眀月枝頭照淚痕次韻絶頂秋髙風露寒倚闌心事到梅間誰知嵗晩相思意欲種梅花滿此山贈林愚庵墨梅色空已解花光意香影難隨逋老蹤此叟芒端不著蜜㡬囘曽誤壁間蜂題蕭照畫山水漁父四軸裂石㫁崖如赤壁暗想當年學士蘇巨口細鱗新網得一樽惟有月相娛輕蓑短棹下滄浪不是尋常黄㡌郎料應江上青山色肯博人間白玉堂火雲収盡天逾闊野艇歸来日未斜秋思滿江禁不得又吹長笛出蘆花野航偶繋梅花下人在梅花與雪俱直釣情知魚不食一絲終日掛氷壺又漁父四首昨日賣魚到城郭暑氣千門正炮烙買酒歸来風露凉始信人間漁父樂釣得魚来日又斜潮廻無路可歸家炙魚當飯且一飽閒㸔白鷗飛浪花海光㶑灔月團圎一顆明珠落玉盤鷗鷺不知何處宿白頭閒坐把魚竿青山淡淡水悠悠有客江邉孟浪逰漁父相逢欲借問掉頭吟詠不相酬七夕盈盈一水望牽牛欲渡銀河不自由月照纎纎織素手為君裁出翠雲裘江上聞笛笛聲何處水茫茫潮落沙寒月照廊嵇吕成塵不可覔滿襟清淚憶山陽春曉聞禽唤囘春夢幾聲禽澗草巖花動此心搔首偶然自失笑不知何處是山林聞雞無數窮簷苦夜悠一聲驚散枕邉愁天家合把黄金鑄置向竿頭赦九州聞蟬閉息含真抱葉枯春風將盡蛻寒膚緑槐忽作仙人嘯長曵一聲山日晡賦竹間禽晴哢連林春翕翕一片勞心不堪縶竹間勿作么鳳吟何處飛来羽衣濕飯牛歌新秧挿遍水盈疇童穉相呼去飯牛極目平坡煙草細歌聲何處雨颼颼水碓閒過枯崖丈室午困假榻起聞碓聲偶成午枕閒隨夢出塵覺来不記是城闉寂無人語惟聞碓恐有穿腰持石人詠狸買魚日日與狌狸捕䑕有心奚待飢但免翻盆與覆碗何須要見血淋漓詩餘滿江紅登樓偶作樓倚虚空覺人世不知何處身縹緲半簷星斗一窓風露潮退沙平鳬雁静夜深月黒魚龍怒把清樽獨自笑餘生成何事塵埃外談髙趣煙波上題新句這美景良宵且休虚度夢覺宦情甜似蠟老来况味酸如醋念兒曹南北㡬時歸情朝暮賀新郎贈鐵笛鐵笛穿花去問長安市上生涯而今何似破㡌青衫塵滿面不識何人共語且面壁聽風雨惟我虚中元識破笑人間日月無停杼名與利莫輕許人生窮逹皆天鑄試燈前為問靈龜勸君休怒心肯命通元有數何幸知音記取季主也應留得住百嵗光隂弹指過算伯夷盗跖俱塵土心一寸人千古漁父詞十三首萬里長江一釣絲蕭蕭蓬鬢任風吹微雨過片帆欹青山濃淡更多竒江渚春風澹蕩時斜陽芳草鷓鴣飛蓴菜滑白魚肥浮家泛宅不曾歸煙浦廻環㡬百灣無人知此橛頭船風露冷月姢姢雲間一過㸔飛仙野䌫間移石筍江旁人爭㸔老眉厖鋪月席展風􅐼飛來何處白鷗雙葭荻横披衆木東浪花如雪晩來風雲母幌水精宫蓮花一葉白頭翁飄忽狂風一霎間長魚吹浪勢如山牢繫䌫蓼花灣白鷗沙上伴人閒清曉朦朧古渡頭煙中人語艣聲柔雲五色蜃成樓雞鳴日出似羅浮搔首推篷曉色新雪花飄瞥大江濱漁父醉不収緡白髭紅頰玉為人明月愁人夜未央篷􅐼如畫水浪浪何處笛起凄凉梅花噴作一天霜白首漁郎不解愁長歌箕踞亦風流江上事寄蜉蝣靈均那更恨悠悠琉璃為地水精天一葉漁舟浪滿顛風肅肅露姢姢家在蘆花何處邉江上浪花飛灑天拍堦鞺鞳屋如船月不夜水無邉何處笛聲人未眠逺入茫茫無盡邉漁舟來往似行天欹枕㸔不成眠誰識人間太乙仙又漁父詞二首書𤣥真祠壁白水塘邉白鷺飛龍湫山下鯽魚肥欹雨笠着雲衣𤣥真不見又空歸巖下無心雲自飛塘邉足雨水初肥龜曵尾緑毛衣荷盤無数爾安歸欸乃詞贈漁父劉四白頭翁白頭翁江海為田魚作粮相逢秖可唤劉四不受人呼劉四郎
