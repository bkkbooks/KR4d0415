body:
  text: 心泉學詩稿巻二宋蒲夀宬撰五言古詩舶使王㑹溪太守趙見泰九日領客枉頋山中賦采菊東籬下悠然見南山韻十首翠節摩秋雲朱轓暎朝彩欣欣兩賔主濟濟衆僚寀此㑹良已希斯文固應在寂寞秋後香今晨有人采結彼山下茅對此山上瀑白日成蹉跎長年抱幽獨嚶嚶自禽鳥踽踽亂樵牧門巷何多車山中有佳菊龍山在何許驅車故城東壯遊值佳月髙懐激清風深知孟萬年獨有柴桑翁至今佳傳香索之迷芳叢淡淡暮秋色行行遶疎籬最愛重九名擬和柴桑詩風流足千載感慨彼一時此日不易得有酒安可辭白露零髙寒西風滿原野濁酒歡重持黄花笑盈把詩句斐莫裁秋容浩難冩豈為今日娛逢之百世下晨䇿登青霞衆峯鬱綢繆舉目嗟新亭緬懐憶神州酣觴氣磊磊感物心悠悠偉哉此二翁髙風繼前修南陽有菊水一掬清且鮮滿潭浸秋色餐英飲寒泉將以夀道脉非惟制頹年豈不随衆草正色乃自然百年豈非長流光迅飛電月渚愁賔鴻風簷凄去燕鴻燕胡獨乖參辰豈相見念此霜中英良時不妨殿匡廬詎云逺日日望翠嵐黄花裛露掇薄酒如飴甘迢迢想髙遯亹亹懐清談緬睇良有以舊居在其南天台赤霞頂峨眉翠雲間人物自楚楚文采何斑斑屈宋豔何摘陶謝髙可攀咳唾随天風萬古輝此山王蜀人趙台人九日簡留松澗瀼瀼白露墜獨起行遶籬豈泥兹晨游偶諧昔人期白衣已縹緲幅巾自淋漓舉杯泛寒榮何以慰所思登山極野望涕泗空漣洏戚戚霜葉語鴈過鳴聲悲參軍爾何事㡌側無人知莫輕一時謔貽此千載嗤餐英飲沆瀣政坐騷人癡起酹彭澤翁此意堪語誰心泉山泉不知源流出石磊砢坎止心維亨䝉養行必果乆視空無塵静趣自忘我明月知此心時印夜光顆九日貴客入山地狹不足以容歌舞故作莫歌亂我蛩莫舞踐我菊歌不入此耳舞適局汝足蛩吟今古心菊老貧賤屋斟菊聽我蛩絶勝人間曲和漳浦余明府割鷄薦鸞刀飛鳬躡仙跡惠與清漳流名髙魯山石亷謹今所難吾道幟可赤作縣既有箴救世豈無䇿澗水疑鳴琴中宵起人憶呈大帥侍郎陽巖洪先生猗桐擢新翠况此當春陽靈鳯何髙翔豈不懐朝光積隂既去屏先鳴詎能忘腐草倐已化破柱安所藏聲猷動寰海偃蹇持孤芳清風肅羽纛白日成圭璋乆期薦清廟欲與興頽綱恩綸甫雜遝符采相輝煌元祐心可續江左脉自長精神夙聚㑹賡歌藹明良願整池上翼繼我文靖梁上舶使監丞王㑹溪抗意欲窺竒栖潛在郡帙猶疑甕為天豈信盲問日清晨非夢寐見此五色筆寒光動斗牛餘照堕圭蓽目前千古在吾故一日失至道涵深純大雅藏僴瑟懐兹泉石心賁之林野質百年豈不短萬羡從此畢倘云可與語敢憚行以膝登師姑巖見城中大閲恍如陣蟻因思舊從戎吏亦其中之一蟻感而遂賦晨起捫層巔蒼茫見塵市鼙皷生逺陴壺蠭在幽耳遥知細栁屯于時閲軍士俯彼萬鎧羣㣲哉一窖蟻初集如慕羶俄擁如聚米或圓如旋磨或方如縁几隠隠床下聲牛鬬差可擬未熟黄粱間忽憶大槐裏昔在羣蟻中不知蟻是已長揖謝孫穰㣲笑辭翦起蠻觸胡為哉鷄蟲今已矣醉眼未醒時此真尺與咫更陟最上頭須彌亦芥子送郭濟叔分教邵陽秋山多爽氣南楚登修程豈無離别懐此别人所榮睠言紫㡌秀翹然碧流英千載木鐸寄一脉濓泉清無氊不言寒有道當自鳴采芹發新謡吟藥生逸情汾陽昔何人努力加令名古意答胡葦航偃蹇當風松四望無寧枝蔦蘿空自纒鸞鳳非所覊固乏棟梁具聊聳巖壑姿豈無深林柯百尺懸旌麾下有千嵗苓勿使行人知送逺曲别葦航驅車晨出門薄酒持送君離心一寸鐵修嶺千重雲遥憐風雨夜應念霜雪羣猿鶴豈敢怨所期在斯文見山䑓疊石生幽雲層䑓起脩竹羣山不出門一日俱在目逺眺極悠悠男兒豈碌碌寳匣長夜鳴黄金㡬時築此事誰與論掀髯對雲麓泊舟蘭溪江流萬古意客遊邁中年茫茫見逺樹𣺌𣺌嘆逝川旅舟泊明月溪謳出長煙千帆趣各異萬里愁共煎船頭有美酒吹火煑小鮮丈夫非無淚不洒商婦絃登師姑巖懐古十韻郭中愛青山推牕納青碧不見山中人白雲自堆積登睇廓悠悠此眼亦已窄但見寰中塵不見塵中客相去詎㡬許恍若萬里隔日暮攀崔嵬泫然感疇昔蜀道無人行嵩山絶蹄跡豈無九囘腸安得雙飛翮傾我百壺酒撫此千丈石不知蠟屐翁著得㡬量屐仲冬下澣㑹同僚遊東巖圖經云此乃仙人蜕骨之地中有石鼔扣之震響羽人脱屣去古洞留嵌巖白雲亦世態随風蜕其緘石飴已何許誰能味其甘土偶寂不語樵牧同此龕坎坎擊石鼓歸去夸彼談遂使蠟屐人於此移其貪猗桐植翠蓋翳翳當薫南琤然激石流燕坐心黙參朝暮豈異理莫誑狙四三暄涼得其適所訝非瘴嵐梅花對白髪風前雪鬖鬖揮觴屬同僚出語諧酸鹹猶拘鐵漢語飲之不至酣託時紀曾遊誰將鐵為庵寄豫章李明府太白揺芒芒只在西山陽常言欲千里一夜千里長酒盡還磊磈出匣鳴干將蘭菊猶可秋白日安可量亦竹軒娟娟竹上露泠泠竹間風風露自髙潔軒牕亦玲瓏明月散清影獨起行遶叢緬懐愛竹人氣味千載同六和塔僧房天風語簷鈴蒼靄藏古殿穿竹逢緇衣拈花對黄面誰把山水心為我露一線推牕古樹隙空水還匹練山色忽有無潮來半空濺須臾簸舟楫木葉飛片片魚鰕恣掀舞洲渚入􅨗煉山僧寂無言千㠶閲將徧送梅峯阮監鎮東歸豪氣宇宙窄健筆風雷驚處禈笑羣蝨有酒甘步兵半酣百年寄一嘯千古輕青眼能㡬人白首識此情噴玉布採孟東野詩語蒼珉卧偃蹇飛瓊潄潺湲東野噴玉布廬山谷簾泉玉斧敲寒氷随風走連巻清聲足洗耳枕流恐徒然梅陽郡齋鐵菴梅花五首廣平一寸鐵不信句鍊柔猶疑雪月競韜玉無處求神人藐姑射夜趂嫦娥遊縹緲不可見天風想琳璆孤山隱君子搜索入幻眇方且判鴻濛倐爾得一竅童鶴俱不知吟成忽自笑翛然脱情塵髙標立寒峭江南擅名勝雅愛陸敬風豈無可以贈折枝寄郵筒緘香不敢泄千里一寸𠂻對雪感嵗暮白頭謾西東卓哉誠齋老驅車陟崔嵬清風欲洗瘴駕言為花來仰止氷玉人念彼同根荄思翁不可説江邊重徘徊枯株類鐵漢瘴瘧不敢侵嵗寒葉落盡㣲見天地心陽和一㸃力生意滿故林至仁雨露澤不覺淪肌深萬壑清流㫖哉哲人語有道親為傳清流出萬壑千載此兩賢誰傾六月雪洗我一片天妙趣不可極如此山中泉白水巖泰山有積霤坤媪乃善蔵何時發靈祕一脉流膏滂至仁及物意後世疑濫觴螭蟠乆懶卧辟易離電光豐隆亦豪士夜半驅阿香天鼓何處來大雪驚飄揚飛星雜雨射怒雹翻飊狂倚欄兩眼眩應接俱弗遑吕梁三十仭吾聞老䝉莊行歌不憚勞習坎守故常峨眉有仙伯佛迹窺荒唐濯足弄海月戲侮相頡頏堪笑失筯人氣骨何羸尫醉呼李太白欲製芙蓉裳此泉願為酒萬斛輸滄浪簡寂耿我夢九疊迂我腸鴈蕩更詭異龍湫舞堂堂何當寄鵬翼瞬息天一方仙人笑擘脯滄海觀種桑人世彈指頃萬古天地長戯効浪仙體碌碌復碌碌世事安可卜馬蹶輕四蹄䕫行矜一足知守吾轍難遑問羊腸曲行行復何之幽人在空谷書㑹溪郴陽瀑布圖後三首山椒斫寒翠澗曲披𤣥圖寫此一𣲖潤化作萬頃腴誰知田中禾粒粒心上珠楚山亦瘴癘湘水多幽靈髙飈雷電激盡日霰雪零滌去熱惱腸清風自泠泠千山六月火可使金石然懐兹水一滴想彼心千年願君倒天瓢流澤無中邊草堂瀑布西瞻香爐氣北望鍾山英寧如坐巖曲飛玉光欄楹異哉天地秀孕此氷雪精梅花立其旁姑射凌寒清仙帔月耿耿神珮風琤琤牕户六月冷草木三冬榮錦水懐少陵銀河照長庚所嗜固不同聊復娛吾生題瀑布圖後平生託游從林野乃其趣出處偶不同清濁良已忤解組浣我塵叩門為君訴方殷岐黄事何日當展晤欲潄巖下泉蛩驉念同路黙擕照膽鏡歴歴見情愫韋韠誰為驅千林瀉懸布初掛氷一簾晶晶滴珠露弄電不輟笑轟谷激電怒玉虬擘重崕白晝雲雪互震掉若弗容俄然脱沉痼寂寂霜林鐘茫茫虎溪渡草堂香山基興廢今㡬度誅茅詎為晩千古一旦暮與君共兹圖濯濯如振鷺登眺晨百囘疇能局髙步中庭步月月光被中庭竹影弄幽色瀟瀟一幅素灑灑數莖墨忽然風動處惟有月冩得此畫應入神無言自心識純陽洞讀書和中山陳禮郎韻弄珠寄南海移文譏北山出處雖異位夢覺同一闗純陽有真境古洞扄林端絶頂象緯逼六月天氣寒道人討幽勝誅茆謀盖棺縁深野鷄狎供罷齋魚閒斗軒適容膝㸃勘酬鈆丹理義貴自得神仙諒非難嗟我乆荒索摧心罹棘艱羞羡鶴俯仰空悲馬班桓終南在何許得去何須還又題純陽洞十里捫藤蘿千崕挿虛碧仰覺雲漢低俯見塵市窄小山走委蛇逺水别支脉身騎鷦鷯枝目眇大鵬翮更有千載人幽巖蜕空魄朝躡一片雲夜嘯百丈石我疑真人去留此守劍舄道人既無心何事苦著跡我有一壺酒起舞酹仙伯松槿雖殊途宇宙同作客枸杞井四時可以採不採當自榮青條覆碧甃見此眼已明目為仙人杖其事因長生飲此枸杞水與結千嵗盟山中井乾元肇初氣坤母乃六之誰明爻象意鑿出混沌竒所以擊壤民飲水源不知空山有古甃夜氣方歸時明月照我牖獨起擕軍持一瓢飲沆瀣凉意生肝脾下以澆丹田上以滋華池瀟然脱塵土舉身入希夷神人授我訣欲以療我飢歸來煑白石精饌瓊為糜菊花潭何處無甘菊何處無清泉菊泉適相值天地何嘗偏豈但為九日可以踰百年願與潭下村餐英汲潺湲古意梳鬟照寒泚寒泚知貞胷整鬟摘秋芳秋芳無冶容平生㡬偃蹇今逐梁君鴻既甘布裙績寧厭短褐舂剔目信已篤刲耳何所從獨撫箜篌謡河流自潨潨頭陀成菴主刺血冩法華經丹書何切切滴心不滴血縱使血可乾其如心不竭蜀鳥啼作花至今萬山纈殺身以成仁遺訓有先哲燈蛾出暗亦已顯傅翼乃不任趨炎弗知止倐忽遊燧林不見異域傳乃有噉火禽蜜蜂四時有佳卉兩股不停探花露本清冽安用如許甘平生事苦口氣味轉不諳蜘蛛輕絲出皤腹口織不用梭前身豈虞人所食在網羅茆欄亦可罥如此豸者何促織炎夏居壁根凉秋噪籬側安得懶婦名豈其曠乃職不念作繭勞徒能促人織蟻𤣥駒不可縶若象寜無端南柯二十載夢覺指一彈誰云丘垤微轉覺天地寛蠧魚種芸豈辟蠧無水乃有魚平生破萬巻胷次藏石渠何如葉上蟲篆出先秦書捫蝨上即居人頭下即居人身夙豈為人食今乃務食人不必勞爪掐聊以捫對賔蚊二首白日㳂溝渠中宵隱堂奥觸處招燎烟㡬人有良幬眶睫知若何口觜有計暴晝伏夜已動血人謀其生不作林中虎而為帳下虫飢虎有時逢林宻少人行㣲物不可忽羣聚成雷轟衆觜錐刀鋩矮屋甑釜烹膚𤓰良自忤扇撲勞迭更下車摶猛虎一死政自輕纎纎無所詰長夜不肯明為我驅蜚亷么麽一掃清蚤疾跳若幻術常笑蝨縫拘動致磨齒牙害止搔皮膚纎芥何足云有人飼於菟
