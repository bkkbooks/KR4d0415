body:
  text: 提要心泉學詩稿六卷别集類三附録臣等謹案心泉學詩稿六卷宋蒲夀宬撰夀宬之名不見於史其集亦不載於藝文志惟明文淵閣書目載有蒲心泉詩一部一册檢永樂大典各韻內所録頗多其間題名皆作夀宬而凌迪知萬姓統譜則作夀􅍲黃仲昭八閩通志又作夀晟互有同異今按永樂大典各卷皆作宬字當非偶誤其作晟􅍲字者殆傳寫訛也夀宬家本泉州其官履不概見惟萬姓統譜稱其于咸淳七年知蒲州按蒲州非南宋地而集中有梅陽壬申劭農偶成書呈同官詩壬申為咸淳八年梅陽即梅州今為廣東嘉應州地是夀宬實知梅州萬姓統譜又載其在官儉約于民一毫無所取建曾井汲水二瓶置座右人頌曰曾氏井泉千古冽蒲侯心事一般清是夀宬在當日為循吏八閩通志則稱宋季益廣二王航海至泉州守臣蒲夀庚距城不納皆出其兄夀宬隂謀夀宬佯著黃冠野服入法石山下自稱處士而密令夀庚納欵于元既而夀庚以歸附功授官平章富貴冠一時夀宬亦居甲第一日二書生踵門獻詩有水聲禽語皆時事莫道山翁總不知之句夀宬惶汗失措追之不復見云云則夀宬又一狡黠之叛人稗官小說記載多岐宋元二史皆無明文其孰僞孰真無從考證今觀其詩頗有冲淡閒逺之致在宋元之際猶屬雅音裒録存之釐為六卷亦足以備一家若其人則疑以傳疑姑附諸南宋之末焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8ef9d8880fd319b1b772e2194ae9bce861d76796e21482649dde6cfdf52ec999
