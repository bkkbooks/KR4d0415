body:
  text: 心泉學詩稿卷三宋蒲夀宬撰七言古詩神駿歌送趙委順就漕神駿不受羈豈知日千里小試秋風前爍爍電光起何須金絡腦不用珊瑚鞭徐看血汗沫透出青連錢飛去度赤水橫行抹燕山持歸獻天子髙列十二間渴飲水底月飢餐草頭珠輕搖玉麈尾側碾青氍毹振鬛長鳴謝伯樂千秋萬古八駿圗子别母呈所翁陳先生子别母欲别牽衣意何苦母有衆兒俱母憐兒無别母兒誰乳海惡寧匪蛟山叨莫如虎小大不相棄髙深自為扈萬古天地中何得如母所披絮成踟蹰履霜正凄楚不見城上烏相隨八九子反哺何足云慈烏乃如此引翼且莫髙短翅將千里醉歌有人八百嵗作鬼三千年如此豈不夭或者稱其綿大椿一春秋為嵗各八千久矣摧為塵朝菌猶目前燕坐一息頃直到羲農邊誰謂未來事如漆未來龜鏡已在先天地一指掌日月雙跳丸摶沙小兒戲滄海為桑田南華達生亦已死伯倫半醉不是顛讀書堂上眼如月輪扁釋鑿乃囅然髙車本桎梏更被繩墨牽利澤苟未諧仁義空自煎有客區區老山澤不鳴不食稱神仙呼來飲酒不肯飲月明騎鶴遊青天舉杯邀明月舞影各自憐必求至樂何者為至樂今也不樂何用空拳拳菊露謡清晨採黃菊露滴露花叢黃花泣白露白露晞秋風秋風莫相試菊薤心不同薤露明朝落不落黃華獨老秋風中送劉童子試藝天京神童八嵗能文能射陳圗先天圗揲蓍法皆能之磽磽頭角出羣玉炯炯瞳人剪秋漪神光現作照書月一覽千古無復遺殊科自可獻上國况能文藝超等夷河洛圗書識藴奧更明爻象通神蓍陳分八勢演古法操弓挾矢動有儀眼前大要固如此有人頭白俱不知當今所重不在寶弓旌聘召方四馳豈無古人已成算時乖事異難設施秋風邊塵浩無際綸巾羽扇思見之終軍棄繻繻尚在劉晏正字字或欹終身願秉清忠節芳猷可繼大年詩送沈保叔國諭試藝右庠讀書讀心不讀迹以言易言竟何益射弓射志不射箭以力假力何足羡因蹄得兔蹄安用以虎視石虎則中設科取藝良已拘分毫得失如摴蒱微官况復多繩墨千里思馳困羈勒生女嫁屬他人屋生男不出出許國堂堂八尺無創瘢如斗金印梔蠟顔一條秋水持贈君腰間願看生風雲君不見唐家將相婁師德也曽應詔紅抹額撾鐘飲酒皆兒嬉握拳透爪真男兒君不來詞寄雲帽上人梅坡翁君不來山中底事堪嫌猜積雨愁人不可道至今聲迹何寥哉竹風微動攬衣起使我一日腸九回君不來門前日日添蒼苔送林城山歸上饒平生喜誦城山句一誦千回起狂慕夢魂夜夜峨眉巔峨眉只在家西住照人樓蜃噓青紅落筆天虬走雲霧冥搜古髓生潤芳坐演正聲入韶濩蘭宫璧水俱雋功金馬玉堂豈迂步何人為呌閶闔雲試使琅玕一披露男兒豈暇謀溫飽丹心要使輝青素水潮方仰昌黎韓日邊又起長沙傅玉山萬仞髙岧嶤叢玉琤琤悅朝暮嗟哉精衛愚復愚海石悠悠力安措傍人齲齒看癡狂持此癡狂向誰訴古來離别惟有酒此别情酸酒如醋萍蓬萬里終有家而今更把家為路送孫耕山梅落癡風寒贔屭海鴈驚春動歸思蹇驢石磴空踟蹰黃犢青山勞夢寐千載休疑潄石訛幾人堪説種瓜事南州髙士不可攀俗吏空餐抱深愧贈日者馮鼎山馮君胸中爛星斗測人窮達誰與偶得錢便據青旗亭北斗還堪把漿酒醉來訪我梅花傍索飲哦詩恣狂吼平生許豫皆公侯大軸長篇玩盈手不言于麓神仙人泣雨滂沱氣填口與君生長醉鄉國借箸前籌為君剖東坡固類韓昌黎伯倫何如畢吏部何處有酒三百壺姓字甘書酒人簿畏死安能抱仁義貪生不解推子午酒星此去住何宫相從且作糟丘主濯足瀑下石峽轟轟作雷吼白虹飛趨電光走老蛟攪起隂壑藏電雪當空射瓊玖禪僧倚錫疑欲飛兒童驚呼不停口山夫伸足承下沫隂風凛凛生毛髮雨飛如箭任不知旁人休猜鐵為骨壯哉亭觀龍湫作雪車冰柱劉義狂玉川更與相頡頏車聲羊腸幾盤折飛冰走雪何茫茫天公矜此老怪物六丁直下白晝驅阿香豐龍列缺一時起千車百柱摧靡靡玉蚪銀闕掀霜髯藥兔蟾宫搗瑶髓濤驚浪駭不可摹璧碎珠傾詎堪擬長風吹雨一座寒兒童不敢正靣看狂客何心助鼓譟磽田萬頃思波瀾被髮行歌愜狂想寶華天雨寧専賞炎天上火下如湯一𣲖清泠浹鄰壤勸君飲酒君莫疑有酒不飲吾何癡夜光魚目紛紛雜錯烏可辨眼中如露如電醉來大笑俱不知登北山真武觀試泉莫誇陽羡茗在彼山之巔莫誇惠山溜試此山之泉不生陸鴻漸渴死盧玉川且共春風裏不鬬社雨前雀舌最嫩弱植耳嘉樹一發如針然靈苗合讓武夷貢清香不與羅浮専北山古丘神所授以泉名郡天下傳置郵縱可走千里不如一掬清且鮮人生適意在所便物各有産盡隨天蹇驢破帽出近郭褁茶汲井手自煎泉鮮水活别無法甌中沸出酥雪妍山中道士不識此彈口咋舌稱神仙從今決意修茗事典衣買樹蒔井邊道士且莫顛古人作善戒所先山中種茶一百頃不如山下數畝田飢餐渴飲無長物何患敲門驚晝眠遊金山寺呈茂老長江氣勢何雄雄波心幻出青蓮宫江流萬古浮不去疑有根蒂誰能窮遡流逺見一培塿傳聞壯觀疑談空風帆漸迫驚詭異金碧還繞深蒙茸小船破浪與客去繫纜階石穿玲瓏門前筆架水靣立波濤日夕相撞舂重樓復道費登陟靣靣竒怪陡不同丹徒西望聳觀閣淮海大塊居其東倚欄簷外水轉窄飛鴻沒處明雙瞳與僧煮茗話今古莫窮幻眇窺鴻濛瀛洲方丈在何許騎牛覔牛休憧憧遙指危檣夜泊處驚飈飄簸如飛蓬禪關深閉浪打屋夜定不動猜遊龍清遊適值九月九汲泉細摘黃花叢水上登髙復誰信證明賴有今逺公登堂恍惚見坡印瓣香起敬仙佛蹤想像形容記言語涕零心惻生不逢未窮清興下山去扁舟一瞬在閬風作詩聊復紀遊迹來尋此迹何時重遊西巖劉元城赴貶僑居之所誰扇洪爐欲煮鐵一寸如冰不曽熱嵗寒心事梅花知炭事如何與冰説西巖結屋煙作罩斑斑不露如隱豹人生大欲剛斷除靜處生涯乃仁樂碧梧翠竹如琅玕寒泉玉佩鳴珊珊終焉為計亦不惡豈知白日生羽翰翻思一夜鐘鳴時先生髙臥如希夷何人更嗔瘴鬼瘧及鋒而用皆驚疑薦泉采菊想遺迹奚其與侣昌黎伯薰蕕已定人所知聊把曽遊紀巖石書草屋壁天地無終窮萬物乃芻狗勿誇杏為梁何如甕作牖昔聞巢氏民仁義亦奚有蠢蠢不識知居居自醇厚今來豐屋士文法困繩紐力競蝜蝂蟲計生養狙叟誰家甲第巍入雲何人鶉衣不掩肘豈知鬼瞰因高明安得春陽到窮蔀蝸廬能幾何蠻觸勝亦負憶我柴桑翁荒宅十餘畝草屋八九間柴門五株柳野水滋粳􅀈春畦足蔥韭永日為琴書停雲念親友儀秦枉饒舌施龍漫多口白衣蒼狗安可知不夷不惠自可否愁劇忽失笑愁劇忽失笑不覺心夷然量珠成斗笑不賣鎔金為海愁不煎蜜蜂與蓼蟲生死甘苦緣今也不為樂人有幾百年士龍莫笑跌落水水中不著此笑仙九日芙蓉披靡秋水寒吳姝越艷芳思單漫把黃花事佳節黃花不入歌舞歡昔人戲馬足強健今我無酒空巑岏黃花無言不可詰青山落日明歸翰
