body:
  text: 心泉學詩稿卷一宋蒲壽宬撰賦古賦二首始余卜於斯丘兮倚白雲而為廬豈其有所使兮爰舍吾之故居擷秋菊以為糧兮曰寒泉之與㪺無飢渴之害已兮騁豫駕其焉如朝餐氣於沆瀣兮夕撫景於望舒瀉靈汞以為鏡兮結層冰而為壺流涓涓以不息兮其原一而𣲖殊念區區之抱甕兮決山雨以為腴環碧澗之方流兮知此樂之非魚落方潔之潺湲兮潄瓊瑶而飛珠噴玉布以珊珊兮謂未足以為娛走東岡之嶻嵲兮驅電駕而雷車始雌霓之連蜷兮忽河漢之飛趨彼匡廬之雖大兮愧吾馬其已瘏語猿鶴以毋怨兮盟千載而弗渝捫青霞之絶頂兮倚千仞而為髙聞丹丘之有人兮期萬里之與遨追遐蹤而不見兮悵靈物之難遭豈不同乎穹壤抑有異乎山河東瞻兖濟西望岷峨儻輕風兮可躡衣欲結兮薜蘿念故園之燕麥悲荆棘之銅駝爾乃託延陵之厚俗曰夷獠之同波苟聲教之所暨豈古道之有他笑淳于之蟻夢慨寧戚之牛歌昔子奇兮往矣今鮑叔兮奈何豈無泉石可以婆娑問競日之夸父與奔月之羿娥我欲從兮何所豈復怨兮蹉跎瀑布泉賦昔披榛而導泉愛其流之涓涓居焉而為清冷出之而為潺湲跨蒼崖而直下瀉鳴瀑其如騫忽浣布於火日俄飛帛於天門毋乃氷蠶之織得鮫室之所傳滎瀯偎灅虺虺隆隆或散如凌空之毳鶴或聚如飲澗之流虹其光怪也如此欲想像其奚窮嘗聞吕梁之水懸三十仞沫四十里黿鼉魚鱉不可遊處被髮行歌或蹈于此羅嶺挂泉倒注崩􅀢石樓鐵橋逈不可即衡山三峯最為竦桀噴薄橫飛匪澌而結分映青林日光玉潔自非素朝翳莫能撤香爐奇秀實甲寰海傳之有三千尺賦之今幾百載其自天而下也耿耿長河其赴壑而趨也錚錚萬鎧納兹細流不知幾倍或曰香山草堂布水三尺㵼階隅落渠石或垂練於終朝或鳴琴於永夕非其狀之可傳因其事之可托於兹瀑也非曰干尋豈無匹素使遇昌黎必云振鷺舞風中之仙裳響松間之寶璐非假力於人為果何心乎天雨豫聞斯語斐焉而狂躍然而悟頓消鄙吝之胸如餐沆瀣之露復何騖乎川塗粗可娛乎朝暮苟猶誇彼之雄寧不失吾之故嗟夫其源雖殊塗其流則同赴決合黎而西傾環崑崙而東注非胼胝之聖功豈聲教之所暨利萬物而不爭如方圓之隨器原上善之所稱本天一之初氣和倪梅村梅花賦昔湘纍之託諷兮顧何芳之不萃念草木之凋零兮貫薜荔之落花嗟蘭艾之與處兮亦固知其蕪纇於梅柟之偶缺兮非忿顧而疾視今靈山之獨立兮豈不類乎江渾之憔悴忽繽紛於暮臘兮駭南雪之落地俾孤山之美人兮得以樹夫高致彼桃李之暄妍兮疑此黨人之獨異惟貞潔余一心兮又奚必擇乎都鄙薋菉葹以盈室兮固何足以蔽美攬羣物之紛糾兮初何私於一氣立耿耿於霜晨兮豈欲别一醒於衆醉彼徘徊于清淺兮亦猶行吟於湘水五言古詩七愛詩贈程鄉令趙君吾愛西門豹其事深可效波神豈荒淫巫言亦機巧大嫗去不來小嫗足踸踔豪長涕叩頭從此識政教右魏鄴令西門豹吾愛魯仲康治效多致祥害稼螟犬牙中牟了無傷掾驚雉馴擾兒念雛方將河南有府尹其美乃播揚右漢中牟令魯恭吾愛卓子康作邑非尋常口不及人惡撫字若弗遑禮律乃並用化嚚以為良解馬以與人不較人自償右漢密令卓茂吾愛鍾離意錦製與人異荒縣民無廬茅竹畢繕事亦有多怖人憯憯惑禍祟祝土矢乃盡神譴不敢避右漢堂邑令鍾離意吾愛劉淑方禮遜以化強諄諄耳提訓語味深且長忿恚為可忍莫入鳴絃堂訟者各感去從今無他腸右漢雍丘令劉矩吾愛傳季圭為事求端倪羣愚亦智詐不辨袪厥迷感深賣針媪靦以食豆雞一縣稱神明鼠輩榛其蹊右齊山隂令傅琰吾愛元紫芝卓爾不可移盜虎孰小大許囚虎歸尸音樂第勝負蒍于遭殊知歲滿何所為柴車一縑隨右唐魯山令元德秀詠史八首坩鮓有幾許直欲致一甘豈知聖善意見此轉不堪此毋天下毋清風使人慙坩音堪土器也右陶侃母明知正不足不若斜有餘破衾有何好錦繡乃不如卓哉婦人言賢於五車書右黔婁妻當時詠雪句誰能出其右雅人有深致錦心而繡口此事難效顰畫虎恐類狗右謝道韞琴彈十八拍聽此雙淚流一死固已難萬言復誰尤九原見衛子何語可以酬右蔡文姬幡然棄舊習布裙牽鹿車拜姑禮云畢提甕汲自如富貴此一時何可忘厥初右鮑宣妻拾遺戒不受見金等沙泥對姑不能食又愧他舍雞其視取棗人氷炭恐不齊右樂羊子妻白首携一壺亂流去何之婦呼吻欲裂彼乃昏不知箜篌彈復彈河水風瀰瀰右朝鮮婦色不諧朱鉛力可舉杵臼貧賤何足云持敬在悠久相對如嘉賔旁人莫嫌醜右孟光示兒種榖一嵗事讀書一生期方春不下種竟嵗常餒飢少年不向學終身成愚癡飢猶一家愁愚被衆人欺彼蒼念吾父爾輩得令師欲速成揠苖計日如耘耔程文國有式體製須及時弱冠無所聞出語人見嗤爾勞我則恤我憂爾奚知中夜不遑寐作此勸學詩明月篇海賈不愛死適值驪龍眠深淵頃刻命平地千丈川丈夫豈無志固為兒女煎彼美頭上粲它人口中涎鮫人一滴淚不肯隨漪漣眼見懸珠人明月幾缺圓拙婦吟生為矮屋女本乏超世姿苟焉執絲枲安得組繡竒人各愛厥子驕養隨所宜今晨嫁朱門裝束弗適時尊嫜不厭拙鄰曲莫見嗤或有勸我言學掃長蛾眉妾婦前致辭拙性不可移誰能事膏沐隨人作妍媸采采南澗蘋心事澗水知在家盡子職為婦盡婦儀如何織錦字更製回文詩和博古直五首聖門藹徒衆幾人得稱賢美哉全玉人履行師淵騫寒日辟蘆絮飢倚負郭田所樂者何事至道森乎前豈必挾日月地行即飛仙刀圭儻可覔何處今赤泉少壯能幾時轉盻成白首俯仰百年中蠅營復狗苟規規一世士禮法自繩糾不趂蟻磨旋空嗟兔株守杞菊為餱糧雲山作賔友空泥堅白鳴夷惠徒可否涉世思夷塗理生有常道抱甕灌我園充盤戒鄰棗秋色何蒼然愓焉履霜早偉哉騎鯨人期兹浣花老渺渺無窮門何由拾瑶草惟愛柴桑翁稱心固云好迂踈我何有然諾君不輕卓爾異衆嗜矧兹藹文鳴面壁愧空腹伐木思友生方當與世混疇能别涇清奚因一簪盍使此雙眼明欲引萬古脈賴君辨豨苓曠兹歷億劫矧此浮雲身桑樞弗言病駟馬休笑貧棲棲魯中叟救世誠艱辛鳥獸豈同羣由也徒問津人世彈指頃滄海三揚塵揚塵不可詰濟川豈無人梅陽壬申劭農偶成書呈同官舉酒勸爾農更為我儂勸車笠雖不同所諧此盂飯或耕在災畬或耕在方寸膏雨足一犁田頭怯呼喚五百維莠驕胥徒乃蟊患與國充耘耔勿使地蒿蔓幻體飢渴同世味甘苦半盤中一粒餐鋤下幾滴汗光隂駛歷塊彼此不可玩豈為許行言勸課在兹旦老父傾耳聽童稚繞屏看相顧持我語取信如執劵安得慵耕人從今不言倦感興晨起自理髮握髮雙淚流不見結髮人惆悵空白頭君留白髮種種作一假愁茁哉秋蓬根念此春荑柔送使君給事常東軒先生鋒車洛陽道秋日旌旗光松隂父老語何計攀夕郎南泉昔樂土畫戟深凝香今為雕瘵區鹽米憂倉皇一食不遑暇衆哺安能忘時哉異真倪心乎愛龔黃報政未期年丹詔飛十行正陽初繼離化瑟方再張豈無蘭蕙叢所思在孤芳履聲到星辰泰階列寒芒眷懷赤子情啓齒玉帝旁唐相有遺烈至今留甘棠投後村先生劉尚書采松北山下日與樵者親寸尺拾遺墜時以供炊薪朝躋白雲岡暮宿芳草濵疏泉溉其本鏡心澄爾神上有千嵗鶴羽儀何振振清唳返華表感時懷鳯麟下有千年苓剝落惟夲真久乃瑩雪玉服之袪凡塵清風發萬籟天竅鳴驚人嚴霜肅四宇玉立古柏身桃李衆自托六合惟一根梅竹亦有性嵗寒爭卜鄰蔦蘿爾微彚願乞音棄青雲津逡巡不敢止百年在兹辰柬曽梅坡二首終嵗不相見相逢傾肺肝堪嗟半生事安得舊時歡梅蘂先春白桂華清露寒帽雲行雨意薄暮倚欄干靡靡秋已駛眇焉幽思殷美人百尺樓修帽千丈雲白駒古難縶寒蛩今畏聞得酒且共陶莫惑紙上文送淮東田制幹回司青青拱把木人見毫芒時只恐不早種既種何用疑枝條日已茂雨露日已滋搖本固不可爪膚復奚為驚颷屢欲折積雪久自支昔日靖郭君四十餘男兒中有不舉子其事乃甚竒馳聲自薛起有誰敢齊窺君今已騎鶴莫問腰纒資主人今晉公相量千頃陂溲勃且並用參苓恐無遺相如諭蜀檄昌黎從軍詩倘可露一斑豈無諸公知君來甫兩月雲霧才一披非敢事偃蹇禽鹿不可羈勿詫我泉石恐為君瑕疵吾且自笑我人知我為誰寄窺堂莊使君煌煌列戟第皎皎深衣人菟符藹夙望駒谷韜絶珍苟不守厥素曷以當兹晨情敦脊令急心怛鴻鴈賔餓死甘其薇至德文其身耿耿抱孤月悠悠仰蒼旻何時一握臂漉我頭上巾呼風振我襮與君爽心神欲洗塵萬斛何處覔一塵送使君右司趙是齋皎皎惠山泉脈脈天上潢中含五色文時吐千丈光人間塵土腥聊復褰我裳南州六月暑千里暍欲狂借此一掬潤氷雪生肝腸誰起心中炎奪我腦上涼我願去為龍為雨膏八荒年年刺桐華樹樹皆甘棠贈無庵道人風鑑採霞以為食搴雲以為衣飽暖無所為騎風去如飛間將電作鏡照見人精微欲説不得説天機本無機梅陽寄委順趙君别來栁初茁今見蘭吐芳懷哉佩蘭人欲製芙蓉裳山空蕙帳冷鶴怨秋夜長羣峯暮聳峭蟻夢猶一場乘傳愧已添刻意思所償蚩蚩瘴土氓見此淚欲滂針石一時投若為起羸尫常恐二豎黠神被膏與肓欲盡棄其舊安得師之良夜夢每插羽飛到琴册旁非貪舐鼎事欲窺枕中方緘縢倘寄翼寬此百回腸寄丘釣磯高丘逺望海秋思窮渺瀰苦吟有鬼泣直釣無人知有時捲龜殼箕踞食蛤蜊落日明雲霞狂風舞蛟螭全生帶笭箵聱叟漫奚為一笑橫大江列岫浮修眉畫圖障我目隔此天一涯欲携我蓑笠風雨從所之漁僮緩鼓枻驚我白鷺鷀我欲從伊人薄酒分一巵寄梅坡喬木聳下翠好鳥鳴嚶嚶豈不愛吾廬感此求友聲獨酌歌停雲懷人淚如傾昔我柴桑翁五栁貧亦榮今豫富干樹况有野艇橫鱸魚亦可膾如此夜月明誰諧彼蒼意澗谷敦孤惸青山只依舊沽酒尋前盟矯首雲帽人兩臂羽欲生故人來不來盤俎無人爭與石巖方常簿遊白水塘觀龍湫孤燈照不寐獨起行繞床命駕欲千里千里債已償可憐太拙計弗學時世粧癖嗜鐫聱牙拄彼枯腎腸柴桑賦移居取友勝面墻竒文與疑義相與窺抑揚願給薪水役懷此一瓣香自分參也魯或笑道士狂吁嗟古之人踽踽而涼涼我不欲富貴修短由上蒼齊奴爾何事彭祖今何方莊周蝶體態淳于蟻侯王龍湫一瞬息珠琲萬斛強泛泛蓮葉舟渺渺白水塘薜荔為我衣芙蓉為我裳握石為我飴採菊為我粻興懷自千載有酒且一觴己卯六月十一日書石室壁晏坐圖畫出銀屏列郡山几案空水接舟楫窗竇間清風蕩炎瘴異趣起􅀈頑夢隨白鷗去靜看飛鳥還夜深忽聞笛何處明月灣
